<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
.scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.bglayer1 { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(3px) brightness(0.55); z-index: 0; }
.bglayer2 { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
.toprow { position: absolute; top: 0; left: 0; right: 0; display: flex; flex-direction: row; align-items: flex-start; z-index: 10; padding: 4px; gap: 4px; }
.bottomrow { position: absolute; bottom: 0; left: 0; right: 0; display: flex; flex-direction: row; align-items: flex-end; z-index: 10; padding: 4px; gap: 4px; }
.framewrap { position: relative; width: 55%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.frameimg { position: absolute; display: block; }
.spriteimg { position: relative; display: block; z-index: 2; }
.bubble { border: 2px solid #000; font-size: 3vh; font-weight: bold; line-height: 1.2; flex: 1; word-break: break-word; padding: 3px 5px; border-radius: 4px; z-index: 50; }
.centerbubble { position: absolute; left: 5%; right: 5%; bottom: 30%; z-index: 50; border: 2px solid #000; border-radius: 4px; font-family: sans-serif; font-size: 3vh; font-weight: bold; line-height: 1.2; padding: 3px 6px; text-align: center; }
</style>
</head>
<body>
<div class="scene">
  <img class="bglayer1" id="bglayer1" src="" alt=""/>
  <img class="bglayer2" id="bglayer2" src="" alt=""/>
  <div class="toprow">
    <div class="framewrap"><img class="frameimg" id="leftframe" src="" style="display:none"/><img class="spriteimg" id="leftsprite" src=""/></div>
    <div class="bubble" id="leftbubble"></div>
  </div>
  <div class="centerbubble" id="centerbubble"></div>
  <div class="bottomrow">
    <div class="bubble" id="rightbubble"></div>
    <div class="framewrap"><img class="frameimg" id="rightframe" src="" style="display:none"/><img class="spriteimg" id="rightsprite" src=""/></div>

const TEXT = {

function getDeviceSalt() {
  let s = localStorage.getItem('cc_salt');
  if (!s) { s = Math.floor(Math.random() * 99991).toString(); localStorage.setItem('cc_salt', s); }
  return parseInt(s);
}
function makeSeed() { return Math.floor(Date.now() / 1000) * 7 + getDeviceSalt(); }
function makeRng(seed) {
  let s = seed >>> 0;
  return {
    next() { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s; },
    pick(arr) { return arr[this.next() % arr.length]; },
    bool() { return (this.next() % 2) === 0; },
    range(lo, hi) { return lo + (this.next() % (hi - lo + 1)); }
  };
}
function build() {
  const rng = makeRng(makeSeed());
  const bg = rng.pick(BACKGROUNDS);
  const frameLeft = rng.pick(FRAMES);
  const frameRight = rng.pick(FRAMES);
  const spriteLeft = rng.pick(SPRITES);
  const spriteRight = rng.pick(SPRITES);
  const mood = rng.next() % 5;
  const setup = rng.pick(TEXT.setup[mood]);
  const escalation = rng.pick(TEXT.escalation[mood]);
  const punchline = rng.pick(TEXT.punchline[mood]);
  const leftDark = rng.bool();
  const rightDark = rng.bool();
  const centerDark = rng.bool();
  const centerBottom = rng.bool();
  const flipLeft = rng.bool();
  const flipRight = rng.bool();
  const flipFrameLeft = rng.bool();
  const flipFrameRight = rng.bool();
  const rots = ["0deg","90deg","180deg","270deg"];
  const rotFL = rng.pick(rots);
  const rotFR = rng.pick(rots);
  const frameSizeL = rng.range(55, 76);
  const frameSizeR = rng.range(55, 76);
  const spriteSizeL = rng.range(45, 66);
  const spriteSizeR = rng.range(45, 66);

  document.getElementById('bglayer1').src = bg;
  document.getElementById('bglayer2').src = bg;

  const lf = document.getElementById('leftframe');
  lf.src = frameLeft;
  lf.style.cssText = 'width:' + frameSizeL + '%; transform:rotate(' + rotFL + ') scaleX(' + (flipFrameLeft ? -1 : 1) + '); display:block;';

  const ls = document.getElementById('leftsprite');
  ls.src = spriteLeft;
  ls.style.cssText = 'width:' + spriteSizeL + '%; transform:scaleX(' + (flipLeft ? -1 : 1) + ');';

  const lb = document.getElementById('leftbubble');
  lb.textContent = setup;
  lb.style.background = leftDark ? '#000' : '#fff';
  lb.style.color = leftDark ? '#fff' : '#000';

  const rf = document.getElementById('rightframe');
  rf.src = frameRight;
  rf.style.cssText = 'width:' + frameSizeR + '%; transform:rotate(' + rotFR + ') scaleX(' + (flipFrameRight ? -1 : 1) + '); display:block;';

  const rs = document.getElementById('rightsprite');
  rs.src = spriteRight;
  rs.style.cssText = 'width:' + spriteSizeR + '%; transform:scaleX(' + (flipRight ? -1 : 1) + ');';

  const rb = document.getElementById('rightbubble');
  rb.textContent = punchline;
  rb.style.background = rightDark ? '#000' : '#fff';
  rb.style.color = rightDark ? '#fff' : '#000';

  const cb = document.getElementById('centerbubble');
  cb.textContent = escalation;
  cb.style.top = '22%';
  cb.style.bottom = 'auto';
  cb.style.background = centerDark ? '#000' : '#fff';
  cb.style.color = centerDark ? '#fff' : '#000';
}
build();
