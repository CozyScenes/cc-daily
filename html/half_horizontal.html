* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
.scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.bgstretch { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; filter: blur(2px) brightness(0.6); z-index: 0; }
.bgfit { position: absolute; top: 0; bottom: 0; left: 28%; right: 28%; width: 44%; height: 100%; object-fit: contain; z-index: 2; }
.sidepanel { position: absolute; top: 0; bottom: 0; width: 28%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 4px; overflow: hidden; }
.framewrap { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.frameimg { position: absolute; display: block; }
.spriteimg { position: relative; display: block; z-index: 2; }
.bubble { border: 2px solid #000; font-size: 5vh; font-weight: bold; line-height: 1.2; width: 100%; word-break: break-word; padding: 2px 4px; border-radius: 4px; z-index: 50; flex-shrink: 0; }
.centerbubble { position: absolute; left: 29%; right: 29%; z-index: 50; border: 2px solid #000; border-radius: 4px; font-family: sans-serif; font-size: 5vh; font-weight: bold; line-height: 1.2; padding: 2px 6px; text-align: center; }
</style>

function getDeviceSalt() {
  let s = localStorage.getItem('cc_salt');
  if (!s) {
    s = Math.floor(Math.random() * 99991).toString();
    localStorage.setItem('cc_salt', s);
  }
  return parseInt(s);
}

function makeSeed() {
  return Math.floor(Date.now() / 1000) * 7 + getDeviceSalt();
}

function makeRng(seed) {
  let s = seed >>> 0;
  return {
    next() { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s; },
    pick(arr) { return arr[this.next() % arr.length]; },
    bool() { return (this.next() % 2) === 0; },
    range(lo, hi) { return lo + (this.next() % (hi - lo + 1)); }
  };
}

function build() {
  const rng = makeRng(makeSeed());

  const bg          = rng.pick(BACKGROUNDS);
  const frameLeft   = rng.pick(FRAMES);
  const frameRight  = rng.pick(FRAMES);
  const spriteLeft  = rng.pick(SPRITES);
  const spriteRight = rng.pick(SPRITES);

  const mood       = rng.next() % 5;
  const setup      = rng.pick(TEXT.setup[mood]);

  const punchline  = rng.pick(TEXT.punchline[mood]);

  const flipRight      = rng.bool();
  const flipFrameLeft  = rng.bool();
  const flipFrameRight = rng.bool();

  const rots  = ["0deg","90deg","180deg","270deg"];
  const rotFL = rng.pick(rots);
  const rotFR = rng.pick(rots);

  const frameSizeL  = rng.range(75, 105);
  const frameSizeR  = rng.range(75, 105);
  const spriteSizeL = rng.range(75, 105);
  const spriteSizeR = rng.range(75, 105);

  document.getElementById('bgstretch').src = bg; document.getElementById('bgfit').src = bg;

  const lp = document.getElementById('leftpanel');

  ls.style.cssText = 'width:' + spriteSizeL + '%; transform:scaleX(' + (flipLeft ? -1 : 1) + ');';

  const lb = document.getElementById('leftbubble');

  cb.style.bottom = centerBottom ? '2vh' : 'auto';

}
